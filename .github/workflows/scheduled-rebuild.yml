name: Scheduled rebuild

# Announcements in _data/announcements.yml move into the News list once their
# end_date has passed. That decision is made at BUILD time, so without a push
# the site would keep showing a finished event as upcoming. This job nudges
# GitHub Pages to rebuild every night.
#
# It publishes the site exactly as the normal Pages build does; it changes no
# files and creates no commits.

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
