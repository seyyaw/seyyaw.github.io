# Upcoming events shown in the "Announcements" block on the homepage.
#
# Each entry moves into the News list by itself once `end_date` has passed --
# there is nothing to edit on the day. Note that the move happens the next time
# the site is BUILT, so a scheduled rebuild (or any push) is what makes it
# appear; see .github/workflows/rebuild.yml.
#
#   date      : first day of the event (used for ordering)
#   end_date  : last day; after this the entry is treated as past
#   icon      : single emoji shown as the marker
#   past_text : optional wording used once it has moved to News

