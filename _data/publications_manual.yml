#   extra:      publications the source APIs do not index (theses, posters)
#   overrides:  corrections applied to a fetched record, matched on doi
#               (preferred) or title. Any field is allowed: venue, type, pdf,
#               award, year, url. A `type` set here is authoritative.
#   exclude:    titles dropped from the output entirely
#
# Venue strings use the full proceedings title. `type` is `preprint` only when
# the record has no peer-reviewed venue.

