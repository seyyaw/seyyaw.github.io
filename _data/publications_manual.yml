# Titles below are removed from the generated list. Matching is on a
# normalised substring, so a distinctive prefix is sufficient.
exclude:
  # Metadata artefacts indexed as publications: another author's publication
  # list, a proceedings table of contents, and a thesis cover page.
  - "ANDREAS HOLZINGER – FIVE PUBLICATIONS AND WHY THEY ARE RELEVANT The interactive Machine Learning"
  - "Table of Contents Learning Paraphrasing for Multiword Expressions Lexical Variability"
  - "Using Neural Language Models to Detect Spoilers vorgelegt"
  # Agricultural and public-economics papers by a different author of the
  # same name.
  - "Are smallholder farmers credit constrained"
  - "The Diffusion of Small-Scale Irrigation Technologies in Ethiopia"
  - "Women in Ethiopian Tax Administration"
  - "Hate Speech and Counter Speech Detection: Context Does Matter"
  - "Sentiment Analysis Hate Speech Detection On Twitter Using NLP"
  # Indexed with its bibliography parsed as the author list.
  - "HateModerate: Grounding and Benchmarking Hate Speech Detection"
  # Duplicate record of arXiv 2509.25477, indexed under a second title.
  - "The Rise of AfricaNLP: A Survey of Contributions, Contributors, Community Impact, and Bibliometric Analysis"
  # Presentation slides deposited on Zenodo, not a publication.
  - "A Brief Analysis Of Amharic Nlp: From Pos Tagging To Question Answering"
