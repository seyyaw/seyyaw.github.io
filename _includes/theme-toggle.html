{%- comment -%}
Light/dark switch. Light is the default; dark is opt-in and remembered in
localStorage. The pre-paint script in _layouts/default.html applies the stored
choice before first paint.
{%- endcomment -%}

<button type="button" class="theme-toggle" id="theme-toggle"
        aria-label="Switch to dark theme" title="Switch theme" aria-pressed="false">
  <span class="theme-toggle__icon" aria-hidden="true">☾</span>
  <span class="theme-toggle__label">Dark</span>
</button>

<script>
(function () {
  var btn = document.getElementById('theme-toggle');
  if (!btn) return;
  var root = document.documentElement;

  function paint(theme) {
    var dark = theme === 'dark';
    btn.querySelector('.theme-toggle__icon').textContent = dark ? '☀' : '☾';
    btn.querySelector('.theme-toggle__label').textContent = dark ? 'Light' : 'Dark';
    btn.setAttribute('aria-label', dark ? 'Switch to light theme' : 'Switch to dark theme');
    btn.setAttribute('aria-pressed', String(dark));
  }

  paint(root.getAttribute('data-theme') || 'light');

  btn.addEventListener('click', function () {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
    paint(next);
  });
})();
</script>
